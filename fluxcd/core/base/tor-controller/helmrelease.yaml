---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tor-controller
spec:
  chart:
    spec:
      chart: tor-controller
      sourceRef:
        kind: HelmRepository
        name: bugfest
        namespace: flux-system
  interval: 10m0s
  values:
    kubeRbacProxy:
      image:
        pullPolicy: Always
        repository: docker.io/bitnami/kube-rbac-proxy
        tag: latest
